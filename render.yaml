services:
  - type: web
    name: nova-cloud-relay
    runtime: node
    plan: free
    rootDir: cloud-relay
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_PASS
        value: nova2026
      - key: ROBOT_TOKEN
        sync: false
